# deployment for todo-api. use todo-api-config config map for environment variables. use todo-api-secret for secrets.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-api
  namespace: todo
spec:
  replicas: 4
  selector:
    matchLabels:
      app: todo-api
  strategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: todo-api
    spec:
      containers:
      - name: todo-api
        image: dclearning/todo-api:2.0.0
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            memory: "256Mi"
            cpu: "500m"
        envFrom:
        - configMapRef:
            name: todo-api-config
        - secretRef:
            name: todo-api-secret